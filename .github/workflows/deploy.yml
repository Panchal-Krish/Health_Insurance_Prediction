name: Deploy to IBM Code Engine

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: dhananjay0901/health-insurance-prediction:latest

      - name: Install IBM Cloud CLI
        run: |
          curl -fsSL https://clis.cloud.ibm.com/install/linux | sh
          ibmcloud plugin install code-engine

      - name: Deploy to IBM Code Engine
        env:
          IBM_IAM_API_KEY: ${{ secrets.IBM_IAM_API_KEY }}
        run: |
          # 1. Safely login to IBM Cloud without immediately binding to a resource group
          ibmcloud login --apikey $IBM_IAM_API_KEY -r eu-gb
          
          # 2. Target the exact Resource Group ID (Commented out: API Key lacks permission, let's bypass it!)
          # ibmcloud target -g 275edcd99e4b4252a8d2a7805534352a
          
          # 3. Select the precise Code Engine Project by ID
          ibmcloud ce project select --id a325fdec-3fa4-4e81-babc-c1fd2d2d3032
          
          # 4. Force update the running application with the latest built Docker image
          ibmcloud ce application update --name health-insurance-prediction --image docker.io/dhananjay0901/health-insurance-prediction:latest
