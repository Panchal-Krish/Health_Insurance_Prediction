name: Deploy to IBM Code Engine

on:
  push:
    branches:
      - main
  workflow_dispatch: # Allows manual trigger from the GitHub Actions UI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_HUB_USERNAME }}
          password: ${{ secrets.DOCKER_HUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: dhananjay0901/health-insurance-prediction:latest

      - name: Deploy to IBM Code Engine
        uses: ibm/code-engine-github-action@main
        with:
          api-key: ${{ secrets.IBM_IAM_API_KEY }}
          region: 'eu-gb' # London region
          project: 'dhananjay_project'
          name: 'health-insurance-prediction'
          image: 'docker.io/dhananjay0901/health-insurance-prediction:latest'
